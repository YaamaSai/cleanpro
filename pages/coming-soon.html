<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | CleanPro</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230B5E4C'/%3E%3Cg transform='translate(15 15) scale(1.4)' fill='none' stroke='%23C8F24B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 4.8 7 3c-.29 1.8-1.14 3.16-2.29 4.06S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z'/%3E%3Cpath d='M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97'/%3E%3C/g%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: url('../assets/images/cleaning_bg_coming_soon.png') center center / cover no-repeat;
            color: #ffffff;
            position: relative;
        }

        /* Dark overlay */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(8, 35, 22, 0.88) 0%, rgba(17, 75, 56, 0.80) 100%);
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: clamp(20px, 4vh, 48px) 0 0;
            white-space: nowrap;
        }

        .company-name {
            font-size: clamp(1.1rem, 2vw, 1.6rem);
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        /* ── MAIN CONTENT ── */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: clamp(1rem, 4vw, 3rem);
            max-width: min(700px, 92vw);
            width: 100%;
            animation: fadeUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(24px);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            padding: clamp(0.35rem, 1vw, 0.55rem) clamp(0.9rem, 2vw, 1.3rem);
            border-radius: 50px;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            background: #C8F24B;
            color: #0B3D2A;
            margin-bottom: clamp(1rem, 3vh, 2rem);
            box-shadow: 0 4px 20px rgba(200, 242, 75, 0.5);
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        p {
            font-size: clamp(0.95rem, 1.8vw, 1.2rem);
            color: rgba(255, 255, 255, 0.80);
            font-weight: 400;
            line-height: 1.65;
            margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
            max-width: min(500px, 90%);
        }

        /* ── PROGRESS BAR ── */
        .progress-container {
            width: 100%;
            max-width: min(440px, 90vw);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-size: clamp(0.8rem, 1.2vw, 0.9rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        }

        .progress-track {
            height: clamp(10px, 1.2vw, 14px);
            width: 100%;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 3px rgba(0,0,0,0.3);
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #86efac, #C8F24B);
            border-radius: 100px;
            animation: loadProgress 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.8s;
            box-shadow: 0 0 14px rgba(200, 242, 75, 0.7), 0 0 4px rgba(200, 242, 75, 0.9);
        }

        /* shimmer effect on fill */
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 40px;
            height: 100%;
            background: rgba(255,255,255,0.4);
            border-radius: 100px;
            filter: blur(4px);
        }

        /* ── FOOTER SPACER ── */
        .footer-spacer {
            position: relative;
            z-index: 10;
            padding-bottom: clamp(16px, 3vh, 40px);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.05em;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadProgress {
            to { width: 75%; }
        }

        /* ── RESPONSIVE BREAKPOINTS ── */

        /* Tiny phones: 320px - 479px */
        @media (max-width: 479px) {
            body { justify-content: center; gap: 0; }
            .header { padding-top: 20px; gap: 8px; }
            .content { padding: 1rem 1rem; flex: none; margin-top: 24px; }
            h1 { font-size: 1.6rem; }
            p { font-size: 0.9rem; }
        }

        /* Phones: 480px - 767px */
        @media (min-width: 480px) and (max-width: 767px) {
            h1 { font-size: 2.2rem; }
            .content { padding: 1.5rem; }
        }

        /* Tablets: 768px - 1023px */
        @media (min-width: 768px) and (max-width: 1023px) {
            h1 { font-size: 3.2rem; }
        }

        /* Desktop: 1024px - 1439px */
        @media (min-width: 1024px) and (max-width: 1439px) {
            h1 { font-size: 4rem; }
        }

        /* Large desktop: 1440px - 2160px */
        @media (min-width: 1440px) {
            h1 { font-size: clamp(4.5rem, 5vw, 6rem); }
            p { font-size: clamp(1.2rem, 1.5vw, 1.5rem); }
            .progress-track { height: 16px; }
            .badge { font-size: 1rem; padding: 0.6rem 1.6rem; }
            .company-name { font-size: 1.8rem; }
            .header svg { width: 52px; height: 52px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <!-- HEADER: logo + name, clearly separated from content -->
    <div class="header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="44" height="44" aria-label="CleanPro logo">
            <rect width="64" height="64" rx="16" fill="#0B5E4C"/>
            <g transform="translate(15 15) scale(1.4)" fill="none" stroke="#C8F24B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 4.8 7 3c-.29 1.8-1.14 3.16-2.29 4.06S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
            </g>
        </svg>
        <span class="company-name">CleanPro</span>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
        <div class="badge">Stay Tuned</div>
        <h1>Something amazing<br>is coming</h1>
        <p>We're crafting a new experience. Currently putting the final touches on our new website.</p>

        <div class="progress-container">
            <div class="progress-label">
                <span>Development</span>
                <span>75%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-spacer">© 2025 CleanPro. All rights reserved.</div>
</body>
</html>
